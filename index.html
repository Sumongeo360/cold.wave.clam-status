<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cold Wave Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
 margin:0;
 height:100vh;
 width:100vw;
 display:flex;
 background:#e9eef5;
 font-family:Arial;
}

.wrapper{
 display:flex;
 width:100%;
 height:100%;
}

/* LEFT PANEL */
.left{
 width:40%;
 background:#f7f9fc;
 display:flex;
 flex-direction:column;
}

.map{
 flex:1;
}

.controls{
 display:flex;
 gap:5px;
 padding:5px;
}

select{
 flex:1;
 padding:5px;
}

/* RIGHT PANEL */
.right{
 width:60%;
 display:flex;
 flex-direction:column;
}

/* TOP STATS */
.stats{
 display:flex;
 gap:10px;
 padding:10px;
}

.box{
 flex:1;
 padding:15px;
 border-radius:8px;
 font-weight:bold;
 cursor:pointer;
}

.claimed{background:#d4f8d4;}
.nonclaimed{background:#ffd6d6;}

/* TEMP */
.temp{
 display:flex;
 gap:10px;
 padding:10px;
}

.tempBox{
 flex:1;
 background:#fff3cd;
 padding:10px;
 border-radius:8px;
 font-weight:bold;
}

/* CHART */
.chartBox{
 flex:1;
 background:#ffffff;
 display:flex;
 justify-content:center;
 align-items:center;
 padding:10px;
}

.errorText{
 color:red;
 font-size:20px;
 font-weight:bold;
}

</style>
</head>

<body>

<div class="wrapper">

<!-- LEFT -->
<div class="left">

<div class="controls">
<select id="district"></select>
<select id="upazila"></select>
</div>

<div id="map" class="map"></div>

</div>

<!-- RIGHT -->
<div class="right">

<div class="stats">
<div class="box claimed" id="claimedBox">Claimed: 0</div>
<div class="box nonclaimed" id="nonClaimedBox">Non-Claimed: 0</div>
</div>

<div class="temp">
<div class="tempBox" id="refTemp">Triggered Temp: -</div>
<div class="tempBox" id="obsTemp">Observed Temp: -</div>
</div>

<div class="chartBox" id="chartBox">
<canvas id="chart"></canvas>
</div>

</div>

</div>

<script>

let map = L.map('map').setView([23.5,90.3],7);

L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{
 subdomains:['mt0','mt1','mt2','mt3']
}).addTo(map);

let geoLayer;
let chart;

let dataJSON={}, termJSON={};

/* ================= LOAD ================= */
Promise.all([
 fetch('upazilas.geojson').then(r=>r.json()),
 fetch('Data.json').then(r=>r.json()),
 fetch('Termsheet.json').then(r=>r.json())
]).then(([geo,data,term])=>{

 dataJSON=data;
 termJSON=term;

 init();
 loadMap(geo);
});

/* ================= CLEAN ================= */
function clean(v){
 return v ? v.toString().trim() : '';
}

/* ================= INIT ================= */
function init(){

 district.innerHTML = Object.keys(dataJSON)
 .map(d=>`<option value="${d}">${d}</option>`)
 .join('');

 updateUpazila();

 district.onchange = ()=>{
   updateUpazila();
   refreshMap();
   updateStats();
   updateChart();
 };

 upazila.onchange = ()=>{
   syncFromDropdown();
 };
}

/* ================= UPAZILA ================= */
function updateUpazila(){
 let d = district.value;

 upazila.innerHTML =
 Object.keys(dataJSON[d] || {})
 .map(u=>`<option value="${u}">${u}</option>`)
 .join('');
}

/* ================= MAP ================= */
function loadMap(geo){

 geoLayer = L.geoJSON(geo,{
   style: styleFeature,
   onEachFeature:(f,l)=>{

     l.on('click',()=>{

       let d=f.properties.adm2_name;
       let u=f.properties.adm3_name;

       if(termJSON[d]?.[u]){

         district.value=d;
         updateUpazila();
         upazila.value=u;

         syncFromDropdown();

       } else {
         showError();
       }
     });

   }
 }).addTo(map);

 map.fitBounds(geoLayer.getBounds());
}

/* ================= STYLE ================= */
function styleFeature(f){

 let d=district.value;
 let u=f.properties.adm3_name;

 let fill='transparent';

 if(termJSON[d]?.[u]){
   let s=termJSON[d][u]["Claim Status"];
   if(s==="Claimed") fill="red";
   else fill="green";
 }

 return {
   color:"blue",
   weight:1,
   fillColor:fill,
   fillOpacity:fill==="transparent"?0:0.6
 };
}

function refreshMap(){
 geoLayer.setStyle(styleFeature);
}

/* ================= SYNC ALL ================= */
function syncFromDropdown(){

 let d=district.value;
 let u=upazila.value;

 let obj=termJSON?.[d]?.[u];

 updateStats(obj);
 updateChart(d,u,obj);

 refreshMap();
}

/* ================= STATS (FREEZE GLOBAL) ================= */
function updateStats(obj){

 let d=district.value;

 let claimed=0, non=0;
 let clist=[], nlist=[];

 Object.entries(termJSON[d]||{}).forEach(([u,v])=>{
   if(v["Claim Status"]==="Claimed"){
     claimed++; clist.push(u);
   } else {
     non++; nlist.push(u);
   }
 });

 claimedBox.innerText="Claimed: "+claimed;
 nonClaimedBox.innerText="Non-Claimed: "+non;

 claimedBox.onclick=()=>download(clist,"claimed_"+d+".txt");
 nonClaimedBox.onclick=()=>download(nlist,"nonclaimed_"+d+".txt");

 /* TEMP */
 if(obj){
   refTemp.innerText="Triggered Temp: "+obj["Ref Min Temp"];
   obsTemp.innerText="Observed Temp: "+obj["Observed Min Temp"];
 } else {
   refTemp.innerText="Triggered Temp: -";
   obsTemp.innerText="Observed Temp: -";
 }
}

/* ================= CHART ================= */
function updateChart(d,u,obj){

 let box=document.getElementById("chartBox");

 if(!obj){
   box.innerHTML='<div class="errorText">This upazila is not under Cold wave insurance.</div>';
   return;
 }

 box.innerHTML='<canvas id="chart"></canvas>';

 let series=dataJSON[d][u];

 let labels=Object.keys(series);
 let values=labels.map(k=>Number(series[k]));

 if(chart) chart.destroy();

 chart=new Chart(document.getElementById("chart"),{
   type:"line",
   data:{
     labels,
     datasets:[{
       data:values,
       borderColor:"blue",
       tension:0.3
     }]
   },
   options:{plugins:{legend:{display:false}}}
 });
}

/* ================= DOWNLOAD ================= */
function download(list,name){
 let blob=new Blob([list.join("\n")],{type:"text/plain"});
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download=name;
 a.click();
}

/* ================= ERROR ================= */
function showError(){
 document.getElementById("chartBox").innerHTML =
 '<div class="errorText">This upazila is not under Cold wave insurance.</div>';
}

</script>

</body>
</html>
