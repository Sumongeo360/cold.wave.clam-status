<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Upazila Climate Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  body { margin:0; font-family: Arial; }

  #map { height: 70vh; width: 100%; }

  .panel {
    display:flex;
    gap:10px;
    padding:10px;
  }

  select {
    padding:5px;
    width: 200px;
  }

  .box {
    padding:10px;
    background:#f4f4f4;
    border-radius:6px;
  }
</style>
</head>

<body>

<div class="panel">
  <select id="district"></select>
  <select id="upazila"></select>

  <div class="box" id="refTemp">Triggered Temp: -</div>
  <div class="box" id="obsTemp">Observed Temp: -</div>
</div>

<div id="map"></div>

<script>
let map = L.map('map').setView([23.7, 90.3], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

let geoLayer;
let currentData = {};

let districtSelect = document.getElementById("district");
let upazilaSelect = document.getElementById("upazila");

let refTemp = document.getElementById("refTemp");
let obsTemp = document.getElementById("obsTemp");

function clean(v){
  return (v || "").toString().trim().toLowerCase();
}

function titleCase(str){
  return (str || "")
    .toString()
    .toLowerCase()
    .replace(/\b\w/g, c => c.toUpperCase());
}

/* =========================
   BUILD DATA STRUCTURE
========================= */
function buildData(json){

  let dObj = {};

  json.forEach(f => {

    let d = clean(f.properties.adm2_name);
    let u = clean(f.properties.adm3_name);

    if(!dObj[d]) dObj[d] = {};
    if(!dObj[d][u]) dObj[d][u] = [];

    dObj[d][u].push(f);
  });

  currentData = dObj;

  loadDistricts();
}

/* =========================
   DISTRICT DROPDOWN
========================= */
function loadDistricts(){

  districtSelect.innerHTML = Object.keys(currentData)
    .map(d => `<option value="${d}">${titleCase(d)}</option>`)
    .join('');

  updateUpazila();
}

/* =========================
   UPAZILA DROPDOWN
========================= */
function updateUpazila(){

  let d = districtSelect.value;

  upazilaSelect.innerHTML = Object.keys(currentData[d] || {})
    .map(u => `<option value="${u}">${titleCase(u)}</option>`)
    .join('');

  updateAll();
}

/* =========================
   MAP STYLE
========================= */
function styleFeature(feature){

  let d = clean(feature.properties.adm2_name);
  let u = clean(feature.properties.adm3_name);

  let fill = "transparent";

  let obj = currentData?.[d]?.[u]?.[0];

  if(obj){

    let status = obj["Claim Status"];

    if(status === "Claimed") fill = "red";
    if(status === "Non Claimed" || status === "Non-Claimed") fill = "green";
  }

  return {
    color: "blue",
    weight: 1,
    fillColor: fill,
    fillOpacity: fill === "transparent" ? 0 : 0.6
  };
}

/* =========================
   STATS UPDATE
========================= */
function updateStats(){

  let d = districtSelect.value;
  let u = upazilaSelect.value;

  let obj = currentData?.[d]?.[u]?.[0];

  let ref = obj?.["Ref Min Temp"];
  let obs = obj?.["Observed Min Temp"];

  refTemp.innerHTML =
    "Triggered Temp: " +
    (ref != null ? Number(ref).toFixed(2) : "-");

  obsTemp.innerHTML =
    "Observed Temp: " +
    (obs != null ? Number(obs).toFixed(2) : "-");
}

/* =========================
   MAP REFRESH
========================= */
function refreshMap(){
  if(geoLayer) geoLayer.setStyle(styleFeature);
}

/* =========================
   UPDATE ALL
========================= */
function updateAll(){
  updateStats();
  refreshMap();
}

/* =========================
   CLICK HANDLER
========================= */
function onFeatureClick(e){

  let d = clean(e.target.feature.properties.adm2_name);
  let u = clean(e.target.feature.properties.adm3_name);

  districtSelect.value = d;
  updateUpazila();
  upazilaSelect.value = u;

  updateAll();
}

/* =========================
   LOAD GEOJSON
========================= */
function loadGeoJSON(geojsonData){

  geoLayer = L.geoJSON(geojsonData, {
    style: styleFeature,
    onEachFeature: function(feature, layer){
      layer.on("click", onFeatureClick);
    }
  }).addTo(map);
}

/* =========================
   EVENTS
========================= */
districtSelect.addEventListener("change", updateUpazila);
upazilaSelect.addEventListener("change", updateAll);

</script>

</body>
</html>
