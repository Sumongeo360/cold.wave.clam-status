<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cold Wave Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
 margin:0;
 height:100vh;
 width:100vw;
 display:flex;
 background:#e9eef5;
 font-family:Arial;
}

.wrapper{
 display:flex;
 width:100%;
 height:100%;
}

.left{
 width:40%;
 background:#f7f9fc;
 display:flex;
 flex-direction:column;
}

.map{ flex:1; }

.controls{
 display:flex;
 gap:5px;
 padding:5px;
}

select{
 flex:1;
 padding:6px;
}

.right{
 width:60%;
 display:flex;
 flex-direction:column;
}

.statsGrid{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:10px;
 padding:10px;
}

.box{
 padding:14px;
 border-radius:8px;
 font-weight:bold;
 cursor:pointer;
 text-align:center;
}

.claimed{background:#d4f8d4;}
.nonclaimed{background:#ffd6d6;}
.yellow{background:#fff3cd;}
.blue{background:#d8ebff;}

.chartBox{
 flex:1;
 background:#fff;
 margin:10px;
 border-radius:8px;
 padding:10px;
}

.errorText{
 color:red;
 font-size:22px;
 font-weight:bold;
 text-align:center;
 margin-top:100px;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="left">

<div class="controls">
<select id="district"></select>
<select id="upazila"></select>
</div>

<div id="map" class="map"></div>

</div>

<div class="right">

<div class="statsGrid">

<div class="box claimed" id="claimedBox">Claimed: 0</div>
<div class="box nonclaimed" id="nonClaimedBox">Non Claimed: 0</div>

<div class="box yellow" id="refTemp">Triggered Temp: -</div>
<div class="box yellow" id="obsTemp">Observed Temp: -</div>

<div class="box blue" id="selectedClaim">Selected Claim: -</div>
<div class="box blue" id="selectedNonClaim">Selected Non Claim: -</div>

</div>

<div class="chartBox" id="chartBox">
<canvas id="chart"></canvas>
</div>

</div>
</div>

<script>

let map = L.map('map').setView([23.5,90.3],7);

L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{
 subdomains:['mt0','mt1','mt2','mt3']
}).addTo(map);

let geoLayer;
let chart;
let selectedLayer=null;

let geoJSONData;
let dataJSON={}, termJSON={};

Promise.all([
 fetch('upazilas.geojson').then(r=>r.json()),
 fetch('Data.json').then(r=>r.json()),
 fetch('Termsheet.json').then(r=>r.json())
]).then(([geo,data,term])=>{

 geoJSONData=geo;
 dataJSON=data;
 termJSON=term;

 init();
 loadMap();
 autoSelectFirst();
});

/* ---------- CLEAN ---------- */
function clean(v){
 return v ? v.toString().trim() : '';
}

/* ---------- INIT ---------- */
function init(){

 let districts=Object.keys(dataJSON).sort();

 district.innerHTML=districts.map(d=>
 `<option value="${d}">${d}</option>`).join('');

 district.onchange=()=>{
   updateUpazila();
   selectCurrent();
 };

 upazila.onchange=()=>{
   selectCurrent();
 };

 updateUpazila();
}

/* ---------- UPDATE UPAZILA ---------- */
function updateUpazila(){

 let d=district.value;

 let ups=Object.keys(dataJSON[d]||{}).sort();

 upazila.innerHTML=ups.map(u=>
 `<option value="${u}">${u}</option>`).join('');
}

/* ---------- MAP ---------- */
function loadMap(){

 geoLayer=L.geoJSON(geoJSONData,{
   style:styleFeature,
   onEachFeature:(feature,layer)=>{

     layer.on('click',()=>{

       let d=feature.properties.adm2_name;
       let u=feature.properties.adm3_name;

       if(dataJSON[d] && dataJSON[d][u]){

         district.value=d;
         updateUpazila();
         upazila.value=u;

         selectLayer(layer);
         updateDashboard(d,u);
         zoomLayer(layer);

       }else{
         showError();
       }

     });

   }
 }).addTo(map);

 map.fitBounds(geoLayer.getBounds());
}

/* ---------- STYLE ---------- */
function styleFeature(feature){

 let d=feature.properties.adm2_name;
 let u=feature.properties.adm3_name;

 let fill='transparent';

 if(termJSON[d] && termJSON[d][u]){
   let s=termJSON[d][u]["Claim Status"];
   fill=(s==="Claimed") ? "red" : "green";
 }

 return {
   color:"#0044cc",
   weight:1,
   fillColor:fill,
   fillOpacity:fill==="transparent" ? 0 : 0.6
 };
}

/* ---------- AUTO FIRST ---------- */
function autoSelectFirst(){

 let d=district.value;
 let u=upazila.value;

 selectCurrent();
}

/* ---------- DROPDOWN TO MAP ---------- */
function selectCurrent(){

 let d=district.value;
 let u=upazila.value;

 geoLayer.eachLayer(layer=>{

   let p=layer.feature.properties;

   if(p.adm2_name===d && p.adm3_name===u){

     selectLayer(layer);
     updateDashboard(d,u);
     zoomLayer(layer);

   }

 });
}

/* ---------- SELECT ONLY ONE ---------- */
function selectLayer(layer){

 if(selectedLayer){
   geoLayer.resetStyle(selectedLayer);
 }

 selectedLayer=layer;

 layer.setStyle({
   weight:4,
   color:"#000",
   fillOpacity:0.9
 });
}

/* ---------- ZOOM ---------- */
function zoomLayer(layer){
 map.fitBounds(layer.getBounds(),{
   maxZoom:11
 });
}

/* ---------- DASHBOARD ---------- */
function updateDashboard(d,u){

 let totalClaim=0,totalNon=0;

 Object.values(termJSON[d]||{}).forEach(v=>{
   if(v["Claim Status"]==="Claimed") totalClaim++;
   else totalNon++;
 });

 claimedBox.innerText="Claimed: "+totalClaim;
 nonClaimedBox.innerText="Non Claimed: "+totalNon;

 let obj=termJSON[d]?.[u];

 if(obj){

   refTemp.innerText="Triggered Temp: "+obj["Ref Min Temp"];
   obsTemp.innerText="Observed Temp: "+obj["Observed Min Temp"];

   if(obj["Claim Status"]==="Claimed"){
     selectedClaim.innerText="Selected Claim: YES";
     selectedNonClaim.innerText="Selected Non Claim: NO";
   }else{
     selectedClaim.innerText="Selected Claim: NO";
     selectedNonClaim.innerText="Selected Non Claim: YES";
   }

 }else{

   refTemp.innerText="Triggered Temp: -";
   obsTemp.innerText="Observed Temp: -";
   selectedClaim.innerText="Selected Claim: -";
   selectedNonClaim.innerText="Selected Non Claim: -";
 }

 drawChart(d,u);
}

/* ---------- CHART ---------- */
function drawChart(d,u){

 let box=document.getElementById("chartBox");

 if(!dataJSON[d] || !dataJSON[d][u]){
   showError();
   return;
 }

 box.innerHTML='<canvas id="chart"></canvas>';

 let series=dataJSON[d][u];

 let labels=Object.keys(series);
 let values=labels.map(k=>Number(series[k]));

 if(chart) chart.destroy();

 chart=new Chart(document.getElementById("chart"),{
   type:"line",
   data:{
     labels:labels,
     datasets:[{
       data:values,
       borderColor:"blue",
       borderWidth:2,
       tension:0.3,
       fill:false
     }]
   },
   options:{
     responsive:true,
     maintainAspectRatio:false,
     plugins:{
       legend:{display:false},
       title:{
         display:true,
         text:u+" Temperature Trend"
       }
     }
   }
 });
}

/* ---------- ERROR ---------- */
function showError(){

 document.getElementById("chartBox").innerHTML=
 '<div class="errorText">This upazila is not under Cold wave insurance.</div>';

}

</script>
</body>
</html>
