<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cold Wave Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
font-family:Arial;
background:#dfe8f4;
}

/* FIXED PC SIZE EVEN MOBILE */
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.wrapper{
width:1366px;
height:768px;
display:flex;
background:#fff;
box-shadow:0 0 25px rgba(0,0,0,.25);
}

/* LEFT */
.left{
width:40%;
display:flex;
flex-direction:column;
background:#f7f9fc;
}

.controls{
display:flex;
gap:5px;
padding:6px;
}

select,button{
padding:7px;
font-size:14px;
}

select{
flex:1;
}

#toggleMap{
width:120px;
cursor:pointer;
font-weight:bold;
}

.map{
flex:1;
}

/* RIGHT */
.right{
width:60%;
display:flex;
flex-direction:column;
}

.statsGrid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.box{
padding:14px;
border-radius:8px;
font-weight:bold;
text-align:center;
font-size:18px;
}

.claimed{background:#d4f8d4;}
.nonclaimed{background:#ffd6d6;}
.yellow{background:#fff3cd;}
.blue{background:#d8ebff;}

.chartBox{
flex:1;
margin:10px;
background:#fff;
border-radius:8px;
padding:10px;
}

.errorText{
color:red;
font-size:22px;
font-weight:bold;
text-align:center;
margin-top:100px;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="left">

<div class="controls">
<select id="district"></select>
<select id="upazila"></select>
<button id="toggleMap">Satellite</button>
</div>

<div id="map" class="map"></div>

</div>

<div class="right">

<div class="statsGrid">

<!-- FIXED TOTAL -->
<div class="box claimed" id="claimedBox">Claimed: 0</div>
<div class="box nonclaimed" id="nonClaimedBox">Non Claimed: 0</div>

<!-- CHANGES WITH SELECTION -->
<div class="box yellow" id="refTemp">Triggered Temp: -</div>
<div class="box yellow" id="obsTemp">Observed Temp: -</div>

<div class="box blue" id="selectedClaim">Selected Claim: -</div>
<div class="box blue" id="selectedNonClaim">Selected Non Claim: -</div>

</div>

<div class="chartBox" id="chartBox">
<canvas id="chart"></canvas>
</div>

</div>
</div>

<script>

let map = L.map('map').setView([23.5,90.3],7);

/* MAPS */
let roadLayer = L.tileLayer(
'https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',
{maxZoom:20,subdomains:['mt0','mt1','mt2','mt3']}
).addTo(map);

let satelliteLayer = L.tileLayer(
'https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
{maxZoom:20,subdomains:['mt0','mt1','mt2','mt3']}
);

let currentMap = "road";

document.getElementById("toggleMap").onclick=function(){

if(currentMap==="road"){
map.removeLayer(roadLayer);
satelliteLayer.addTo(map);
currentMap="satellite";
this.innerText="Road Map";
}else{
map.removeLayer(satelliteLayer);
roadLayer.addTo(map);
currentMap="road";
this.innerText="Satellite";
}

};

let geoLayer;
let chart;
let selectedLayer=null;

let geoJSONData;
let dataJSON={}, termJSON={};

Promise.all([
fetch('upazilas.geojson').then(r=>r.json()),
fetch('Data.json').then(r=>r.json()),
fetch('Termsheet.json').then(r=>r.json())
]).then(([geo,data,term])=>{

geoJSONData=geo;
dataJSON=data;
termJSON=term;

init();
loadMap();
updateFixedTotals();
autoSelectFirst();

});

/* CLEAN */
function clean(v){
return v ? v.toString().trim() : '';
}

/* MIN TEMP */
function getObservedMin(d,u){

if(!dataJSON[d] || !dataJSON[d][u]) return null;

let vals = Object.values(dataJSON[d][u])
.map(v=>Number(v))
.filter(v=>!isNaN(v));

if(!vals.length) return null;

return Math.min(...vals);
}

/* CLAIM STATUS */
function isClaimed(d,u){

if(!termJSON[d] || !termJSON[d][u]) return false;

let trigger = Number(termJSON[d][u]["Ref Min Temp"]);
let observed = getObservedMin(d,u);

if(observed===null || isNaN(trigger)) return false;

return observed <= trigger;
}

/* FIXED TOTAL WHOLE BANGLADESH */
function updateFixedTotals(){

let totalClaim=0;
let totalNon=0;

Object.keys(dataJSON).forEach(d=>{

Object.keys(dataJSON[d]).forEach(u=>{

if(termJSON[d] && termJSON[d][u]){

if(isClaimed(d,u')) totalClaim++;
else totalNon++;

}

});

});

claimedBox.innerText="Claimed: "+totalClaim;
nonClaimedBox.innerText="Non Claimed: "+totalNon;
}

/* INIT */
function init(){

let districts=Object.keys(dataJSON).sort();

district.innerHTML=districts.map(d=>
`<option value="${d}">${d}</option>`).join('');

district.onchange=()=>{
updateUpazila();
selectCurrent();
};

upazila.onchange=()=>{
selectCurrent();
};

updateUpazila();

}

/* UPAZILA */
function updateUpazila(){

let d=district.value;

let ups=Object.keys(dataJSON[d]||{}).sort();

upazila.innerHTML=ups.map(u=>
`<option value="${u}">${u}</option>`).join('');

}

/* MAP */
function loadMap(){

geoLayer=L.geoJSON(geoJSONData,{
style:styleFeature,
onEachFeature:(feature,layer)=>{

layer.on('click',()=>{

let d=feature.properties.adm2_name;
let u=feature.properties.adm3_name;

if(dataJSON[d] && dataJSON[d][u]){

district.value=d;
updateUpazila();
upazila.value=u;

selectLayer(layer);
updateDashboard(d,u);
zoomLayer(layer);

}else{
showError();
}

});

}
}).addTo(map);

map.fitBounds(geoLayer.getBounds());

}

/* STYLE */
function styleFeature(feature){

let d=clean(feature.properties.adm2_name);
let u=clean(feature.properties.adm3_name);

let fill='transparent';

if(dataJSON[d] && dataJSON[d][u] && termJSON[d] && termJSON[d][u]){

fill = isClaimed(d,u) ? "red" : "green";

}

return{
color:"#0044cc",
weight:1,
fillColor:fill,
fillOpacity:fill==="transparent"?0:0.6
};

}

/* FIRST */
function autoSelectFirst(){
selectCurrent();
}

/* SELECT */
function selectCurrent(){

let d=district.value;
let u=upazila.value;

geoLayer.eachLayer(layer=>{

let p=layer.feature.properties;

if(p.adm2_name===d && p.adm3_name===u){

selectLayer(layer);
updateDashboard(d,u);
zoomLayer(layer);

}

});

}

/* HIGHLIGHT */
function selectLayer(layer){

if(selectedLayer){
geoLayer.resetStyle(selectedLayer);
}

selectedLayer=layer;

layer.setStyle({
weight:4,
color:"#000",
fillOpacity:0.9
});

}

/* ZOOM */
function zoomLayer(layer){
map.fitBounds(layer.getBounds(),{maxZoom:11});
}

/* DASHBOARD */
function updateDashboard(d,u){

let trigger = termJSON[d]?.[u]?.["Ref Min Temp"] ?? "-";
let observed = getObservedMin(d,u);

refTemp.innerText="Triggered Temp: "+trigger;

obsTemp.innerText="Observed Temp: "+
(observed===null ? "-" : observed.toFixed(2));

if(isClaimed(d,u)){
selectedClaim.innerText="Selected Claim: YES";
selectedNonClaim.innerText="Selected Non Claim: NO";
}else{
selectedClaim.innerText="Selected Claim: NO";
selectedNonClaim.innerText="Selected Non Claim: YES";
}

drawChart(d,u);

}

/* CHART */
function drawChart(d,u){

let box=document.getElementById("chartBox");

box.innerHTML='<canvas id="chart"></canvas>';

let trigger = Number(termJSON[d]?.[u]?.["Ref Min Temp"]);
let series=dataJSON[d][u];

let labels=Object.keys(series);
let values=labels.map(k=>Number(series[k]));

let redDots = values.map(v =>
(!isNaN(v) && v<=trigger) ? "red":"blue"
);

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:labels,
datasets:[{
data:values,
borderColor:"blue",
borderWidth:2,
tension:.3,
fill:false,
pointRadius:2.5,
pointBackgroundColor:redDots,
pointBorderColor:redDots
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{
legend:{display:false},
title:{
display:true,
text:u+" Temperature Trend"
}
}
}
});

}

/* ERROR */
function showError(){

document.getElementById("chartBox").innerHTML=
'<div class="errorText">This upazila is not under Cold wave insurance.</div>';

}

</script>

</body>
</html>
